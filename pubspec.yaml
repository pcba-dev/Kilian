name: kilian
description: Kilian is an app that provides accurate time estimates for trekking trails, helping hikers plan their journey with ease.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=2.18.0 <3.0.0"
  flutter: ">=3.10.0 <3.11.0"

dependencies:

  equatable: ^2.0.5
  geotypes: ^0.0.2
  bloc: ^8.1.1
  json_annotation: ^4.8.1
  intl: ^0.18.0
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.2
  flutter_localizations:
    sdk: flutter
  go_router: ^7.0.0
  responsive_builder: ^0.6.4

dev_dependencies:
  build_runner: ^2.3.3
  bloc_test: ^9.1.1
  flutter_test:
    sdk: flutter
  mocktail: ^0.3.0
  json_serializable: ^6.6.2

# The following section is specific to Flutter.
flutter:
  uses-material-design: true
  generate: true
